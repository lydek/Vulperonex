<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulperonex - OBS Chat Room Web Overlay</title>
    <!-- Import Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Load classic purple-gold theme -->
    <link rel="stylesheet" href="css/overlay-base.css?v=2">
    <link rel="stylesheet" href="css/style-twitch.css?v=2">
</head>

<body>
    <div id="app">
        <transition-group name="ice-spring" tag="div" class="chat-container">
            <div v-for="msg in messages" :key="msg.id" class="chat-line">
                <!-- Badges in front of the display name -->
                <img v-for="(badgeUrl, index) in msg.badges" :key="index" :src="badgeUrl" class="chat-badge" />
                <!-- Display Name -->
                <span class="chat-username" :style="{ color: msg.nameColorHex }">{{ msg.username }}</span>
                <!-- Colon separator -->
                <span class="chat-colon">:</span>
                <!-- Message Content -->
                <span class="chat-content" v-html="msg.message"></span>
            </div>
        </transition-group>
    </div>
    <!-- Load Vue 3 (Local) -->
    <script src="libs/vue.global.js"></script>
    <!-- Load SignalR Client (Local) -->
    <script src="libs/signalr.min.js"></script>

    <!-- Load Overlay Common Utilities -->
    <script src="js/overlay-common.js"></script>

    <!-- Initialize Vue app and SignalR connection -->
    <script>
        const { createApp, ref, onMounted } = Vue;

        const app = createApp({
            setup() {
                const messages = ref([]);
                let messageCounter = 0;

                // Restrict visible message count to 15. Excess messages trigger fade-out animations and leave the DOM.
                const MAX_MESSAGES = 15;

                onMounted(() => {
                    OverlayCommon.initSignalRConnection('/hubs/overlay/chat', {
                        event: (data) => {
                            console.log("[DEBUG] SignalR chat event payload received: ", data);

                            // Parse segments to safely render HTML and emotes
                            let messageHtml = "";
                            if (data.segments && Array.isArray(data.segments)) {
                                messageHtml = data.segments.map(seg => {
                                    const type = seg.type || seg.kind || 'text';
                                    const value = seg.value || seg.text || '';
                                    if (type === 'emote') {
                                        return `<img src="${value}" class="chat-emote" />`;
                                    }
                                    return value
                                        .replace(/&/g, "&amp;")
                                        .replace(/</g, "&lt;")
                                        .replace(/>/g, "&gt;")
                                        .replace(/"/g, "&quot;")
                                        .replace(/'/g, "&#039;");
                                }).join("");
                            } else {
                                messageHtml = (data.htmlMessage || data.HtmlMessage || "").trim();
                            }

                            const newMsg = {
                                id: ++messageCounter,
                                username: data.displayName || data.DisplayName || "Unknown User",
                                nameColorHex: data.colorHex || data.ColorHex || '',
                                message: messageHtml,
                                badges: data.badges || data.Badges || []
                            };

                            messages.value.push(newMsg);

                            if (messages.value.length > MAX_MESSAGES) {
                                messages.value.shift();
                            }
                        },
                        cleared: () => {
                            console.log("🧹 Clear chat command received");
                            messages.value = [];
                        }
                    });
                });

                return { messages };
            }
        });

        app.mount('#app');
    </script>
</body>

</html>
